<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Portada ML — Gestión Comercios</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    /* Cuadrado 1200×1200 — ideal Mercado Libre */
    .card {
      width: 1200px;
      height: 1200px;
      background: linear-gradient(145deg, #0f1419 0%, #1a2332 45%, #0d1117 100%);
      color: #fff;
      padding: 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: -120px;
      right: -120px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.25) 0%, transparent 70%);
      pointer-events: none;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0.9;
    }
    .brand-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #38bdf8;
      box-shadow: 0 0 20px #38bdf8;
    }
    h1 {
      font-size: 72px;
      line-height: 1.05;
      font-weight: 800;
      max-width: 900px;
      margin-top: 40px;
    }
    h1 span {
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 36px;
      color: #94a3b8;
      margin-top: 28px;
      max-width: 820px;
      line-height: 1.35;
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 40px;
      margin-top: 56px;
      font-size: 30px;
    }
    .features li {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .features li::before {
      content: "✓";
      color: #38bdf8;
      font-weight: 700;
      font-size: 28px;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
      padding-top: 48px;
    }
    .badge {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      padding: 20px 36px;
      border-radius: 16px;
      font-size: 32px;
      font-weight: 700;
    }
    .req {
      text-align: right;
      font-size: 24px;
      color: #64748b;
      line-height: 1.5;
    }
    .req strong { color: #f1f5f9; }
  </style>
</head>
<body>
  <div class="card" id="capture">
    <div>
      <div class="brand"><span class="brand-dot"></span> WALTECH</div>
      <h1>Gestión <span>Comercios</span></h1>
      <p class="subtitle">Sistema POS para kioscos y almacenes — stock, caja y reportes en tu PC.</p>
      <ul class="features">
        <li>Punto de venta rápido</li>
        <li>Código de barras</li>
        <li>Control de stock</li>
        <li>Caja del día</li>
        <li>Empleados con PIN</li>
        <li>Soporte WhatsApp</li>
      </ul>
    </div>
    <div class="footer">
      <div class="badge">$25.000/mes · Todo incluido</div>
      <div class="req">
        <strong>Windows 10 u 11</strong><br />
        No compatible Windows 7
      </div>
    </div>
  </div>
  <script>
    // Abrí con zoom 100%. Capturá solo el cuadrado gris oscuro (1200×1200).
    // Win + Shift + S → recorte rectangular sobre la tarjeta.
  </script>
</body>
</html>
