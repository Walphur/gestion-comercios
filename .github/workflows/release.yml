# Publica instalador Windows + latest.json para actualizaciones automáticas (Tauri Updater).
# Disparo: etiqueta v* (ej. v0.1.1) o manual desde Actions.

name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Etiqueta del release (ej. v0.1.1)"
        required: true
        default: "v0.1.1"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependencias
        run: npm ci

      - name: Catálogo supermercado (embebido en instalador)
        shell: pwsh
        id: catalog
        env:
          CATALOG_CSV_URL: ${{ secrets.CATALOG_CSV_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          & ./scripts/download-catalog-csv.ps1 -DestinationDir .
          if (-not (Test-Path 'productos_supermercado.csv')) {
            Write-Host '::error:: Sin productos_supermercado.csv. Publicá el release catalog-data (scripts/publicar-catalogo.ps1) o el secret CATALOG_CSV_URL.'
            exit 1
          }
          "has=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Build y publicar en GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CATALOG_CSV_URL: ${{ secrets.CATALOG_CSV_URL }}
        with:
          projectPath: .
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: Gestión Comercios ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: |
            Actualización automática de Gestión Comercios.
            La app instalada con internet descarga e instala sola al abrir o desde Administración.
            Instalador con catálogo de kiosco embebido (no hace falta copiar CSV a mano).
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.conf.catalog.json
